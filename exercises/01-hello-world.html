<h1 class="text-4xl font-bold text-lunite mb-6 font-serif">1. Hello, World!</h1>
<p class="text-zinc-300 mb-8 font-serif">Write the simplest Hello World program in Lunite with 1 function. It must exactly print "Hello, World!" to the console.</p>

<div class="bg-[#111] border border-zinc-800 rounded-lg p-6">
    <textarea id="ans-input" rows="3" class="w-full bg-black border border-zinc-700 rounded-md px-4 py-2 text-white focus:outline-none focus:border-lunite font-mono mb-4" placeholder="Type your code here..."></textarea>
    <button id="ans-btn" class="bg-lunite text-white px-6 py-2 rounded-md hover:opacity-90 font-mono font-bold w-full">Check</button>
    <div id="ans-feedback" class="mt-4 hidden p-4 rounded-md font-mono text-sm"></div>
</div>

<script>
    (function() {
        const init = () => {
            document.getElementById('debug-btn').addEventListener('click', () => {
                const val = document.getElementById('ans-input').value.trim();
                const feedback = document.getElementById('ans-feedback');
                feedback.classList.remove('hidden', 'bg-red-950', 'text-red-400', 'bg-green-950', 'text-green-400');

                if (val.includes('out("Hello, World!")')) {
                    feedback.classList.add('bg-green-950', 'text-green-400');
                    feedback.innerHTML = "Correct! That is how you make a Hello World program in Lunite.";
                } else {
                    feedback.classList.add('bg-red-950', 'text-red-400');
                    feedback.innerHTML = "Oops! You did something wrong. Check your code, go through the lessons and try again.";
                }
            });
        };

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }
    })();
</script>
