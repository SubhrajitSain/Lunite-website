<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lunite Docs</title>
    <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/SubhrajitSain/Lunite/refs/heads/main/lunite.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Merriweather:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { lunite: '#5201cc' },
                    fontFamily: {
                        serif: ['Merriweather', 'serif'],
                        mono: ['"Fira Code"', 'monospace'],
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Merriweather', serif; background-color: #000; color: #fff; }
        code, pre, input, textarea, button { font-family: 'Fira Code', monospace; }
        .markdown-body h1 { font-size: 2.25rem; font-weight: 700; margin-bottom: 1.5rem; color: #5201cc; }
        .markdown-body h2 { font-size: 1.5rem; font-weight: 700; margin-top: 2.5rem; margin-bottom: 1rem; border-bottom: 1px solid #1f1f22; padding-bottom: 0.5rem; }
        .markdown-body p { margin-bottom: 1.25rem; line-height: 1.8; color: #d4d4d8; }
        .markdown-body pre { background-color: #09090b; padding: 1.25rem; border-radius: 0.5rem; overflow-x: auto; margin-bottom: 1.5rem; border: 1px solid #27272a; }
        .markdown-body code { background-color: #18181b; padding: 0.2rem 0.4rem; border-radius: 0.25rem; font-size: 0.875em; border: 1px solid #27272a; }
        .markdown-body pre code { background-color: transparent; padding: 0; border: none; }
        .markdown-body a { color: #5201cc; text-decoration: none; cursor: pointer; }
        .markdown-body a:hover { text-decoration: underline; }
        .markdown-body hr { color: #d4d4d8; margin-top: 10px; }
        #sidebar { transition: transform 0.3s ease-in-out; }
    </style>
</head>
<body class="flex h-screen overflow-hidden antialiased selection:bg-lunite selection:text-white">

    <div class="lg:hidden fixed top-0 left-0 right-0 h-16 bg-[#050505] border-b border-zinc-900 flex items-center justify-between px-6 z-50">
        <div class="flex items-center gap-3">
            <img src="https://raw.githubusercontent.com/SubhrajitSain/Lunite/refs/heads/main/icon.png" class="w-7 h-7">
            <span class="font-bold">Lunite Docs</span>
        </div>
        <button id="menu-toggle" class="text-zinc-400 p-2">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7" />
            </svg>
        </button>
    </div>

    <aside id="sidebar" class="fixed inset-y-0 left-0 w-72 bg-[#050505] border-r border-zinc-900 flex flex-col z-40 transform -translate-x-full lg:translate-x-0 lg:static">
        <div class="p-6 border-b border-zinc-900 flex items-center gap-4 hidden lg:flex">
            <img src="https://raw.githubusercontent.com/SubhrajitSain/Lunite/refs/heads/main/icon.png" alt="Lunite" class="w-9 h-9">
            <span class="text-2xl font-bold tracking-tight">Lunite</span>
        </div>
        <nav id="sidebar-nav" class="flex-1 overflow-y-auto p-4 space-y-6 mt-16 lg:mt-0">
            </nav>
    </aside>

    <div id="overlay" class="fixed inset-0 bg-black/60 z-30 hidden lg:hidden"></div>

    <main class="flex-1 overflow-y-auto p-6 lg:p-12 bg-black mt-16 lg:mt-0">
        <div id="content" class="max-w-3xl mx-auto markdown-body">
            </div>
    </main>

    <script>
        let appRegistry = [];

        hljs.registerLanguage('lunite', (hljs) => {
            const KEYWORDS = {
                keyword: 'if else while for in return break advance leap attempt rescue finally match other import import_py from assert async await macro let const func public private global class enum extends new',
                literal: 'true false null',
                built_in: 'out in len type raise range list Math File Net Json Sys Time String Regex Set Console Meta Random List Dict Base64 Hash',
                type: 'str int float bit byte char bytes',
                variable: 'this'
            };

            const LUNA_STRING = {
                className: 'string',
                variants: [
                    hljs.QUOTE_STRING_MODE,
                    hljs.APOS_STRING_MODE,
                    {
                        begin: /f"/, end: /"/,
                        contains: [
                            hljs.BACKSLASH_ESCAPE,
                            { className: 'subst', begin: /\{/, end: /\}/ }
                        ]
                    }
                ]
            };

            const LUNA_COMMENT = {
                className: 'comment',
                variants: [
                    { begin: /~~/, end: /$/ },
                    { begin: /~\*/, end: /\*~/ }
                ]
            };

            return {
                name: 'Lunite',
                aliases: ['luna', 'lunite'],
                keywords: KEYWORDS,
                contains: [
                    LUNA_COMMENT,
                    LUNA_STRING,
                    {
                        className: 'function',
                        beginKeywords: 'func', end: /[{;]/, 
                        excludeEnd: true,
                        contains: [
                            hljs.UNDERSCORE_TITLE_MODE,
                            {
                                className: 'params',
                                begin: /\(/, end: /\)/,
                                keywords: KEYWORDS,
                                contains: [
                                    hljs.C_NUMBER_MODE,
                                    LUNA_STRING
                                ]
                            }
                        ]
                    },
                    {
                        className: 'meta',
                        begin: /@[a-zA-Z_]\w*/
                    },
                    hljs.C_NUMBER_MODE,
                    {
                        className: 'operator',
                        begin: /[+\-/*%^&|<>!=?~:;.]+/ 
                    }
                ]
            };
        });

        const renderer = new marked.Renderer();
        renderer.code = function({ text, lang }) {
            const language = (lang === 'luna' || lang === 'lunite') ? 'lunite' : lang;
            if (language && hljs.getLanguage(language)) {
                try {
                    const highlighted = hljs.highlight(text, { language: language }).value;
                    return `<pre><code class="hljs language-${language}">${highlighted}</code></pre>`;
                } catch (err) { console.error(err); }
            }
            return `<pre><code class="hljs">${text}</code></pre>`;
        };
        marked.setOptions({ renderer: renderer });

        const menuBtn = document.getElementById('menu-toggle');
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('overlay');

        function toggleSidebar() {
            const isOpen = sidebar.classList.contains('translate-x-0');
            sidebar.classList.toggle('-translate-x-full', isOpen);
            sidebar.classList.toggle('translate-x-0', !isOpen);
            overlay.classList.toggle('hidden', isOpen);
        }

        menuBtn.onclick = toggleSidebar;
        overlay.onclick = toggleSidebar;

        async function loadApp() {
            const nav = document.getElementById('sidebar-nav');
            try {
                const response = await fetch('registry.json');
                appRegistry = await response.json();
                
                let firstFile = null, firstType = null;

                appRegistry.forEach((section) => {
                    const sectionContainer = document.createElement('div');
                    const header = document.createElement('h3');
                    header.className = "text-xs font-bold text-zinc-500 uppercase tracking-wider mb-2 px-4";
                    header.textContent = section.category;
                    sectionContainer.appendChild(header);

                    const list = document.createElement('div');
                    list.className = "space-y-1";

                    section.items.forEach((item) => {
                        if (!firstFile) { firstFile = item.file; firstType = item.type; }
                        const link = document.createElement('a');
                        link.href = `#${item.file}`;
                        link.className = "nav-link block px-4 py-2.5 rounded-md text-zinc-400 text-sm transition-colors cursor-pointer";
                        link.textContent = item.title;
                        link.setAttribute('data-file', item.file);
                        
                        link.onclick = (e) => {
                            e.preventDefault();
                            window.location.hash = item.file; 
                        };
                        list.appendChild(link);
                    });
                    sectionContainer.appendChild(list);
                    nav.appendChild(sectionContainer);
                });

                const target = window.location.hash.substring(1) || firstFile;
                const item = findItemInRegistry(target);
                
                if (item) {
                    loadContent(item.file, item.type);
                    syncSidebarUI(item.file);
                }
            } catch (error) { console.error("Registry load fail", error); }
        }

        function findItemInRegistry(filePath) {
            if (!filePath) return null;
            const cleanPath = decodeURIComponent(filePath).replace(/^#/, '');
            for (let section of appRegistry) {
                let found = section.items.find(i => i.file === cleanPath);
                if (found) return found;
            }
            return null;
        }

        async function loadContent(file, type) {
            const contentDiv = document.getElementById('content');
            contentDiv.innerHTML = '<p class="text-zinc-600 animate-pulse">Loading...</p>';
            try {
                const response = await fetch(file);
                if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                const text = await response.text();
                
                contentDiv.innerHTML = type === 'md' ? marked.parse(text) : text;

                if (type === 'html') {
                    contentDiv.querySelectorAll('script').forEach(oldScript => {
                        const newScript = document.createElement('script');
                        Array.from(oldScript.attributes).forEach(attr => newScript.setAttribute(attr.name, attr.value));
                        newScript.appendChild(document.createTextNode(oldScript.innerHTML));
                        oldScript.parentNode.replaceChild(newScript, oldScript);
                    });
                }
                hljs.highlightAll();
                document.querySelector('main').scrollTo(0,0);
            } catch (e) { 
                contentDiv.innerHTML = `<h1 class="text-red-500">404</h1><p>Failed to load: ${file}</p>`; 
            }
        }

        function syncSidebarUI(file) {
            document.querySelectorAll('.nav-link').forEach(a => {
                const isActive = a.getAttribute('data-file') === file;
                a.classList.toggle('bg-lunite', isActive);
                a.classList.toggle('text-white', isActive);
                a.classList.toggle('text-zinc-400', !isActive);
            });
            if (window.innerWidth < 1024) {
                sidebar.classList.add('-translate-x-full');
                overlay.classList.add('hidden');
            }
        }

        document.addEventListener('click', (e) => {
            const link = e.target.closest('a');
            if (!link) return;
            const href = link.getAttribute('href') || "";
            if (href.startsWith('#')) {
                const targetFile = href.substring(1);
                const item = findItemInRegistry(targetFile);
                if (item) {
                    e.preventDefault();
                    window.location.hash = targetFile;
                }
            }
        });

        window.addEventListener('hashchange', () => {
            const item = findItemInRegistry(window.location.hash.substring(1));
            if (item) {
                loadContent(item.file, item.type);
                syncSidebarUI(item.file);
            }
        });

        loadApp();
    </script>
</body>
</html>
